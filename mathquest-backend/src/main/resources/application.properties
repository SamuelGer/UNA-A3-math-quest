spring.application.name=mathquest-backend
# BD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mathquest}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:2201}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
#JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.open-in-view=false

server.port=${PORT:8080}
